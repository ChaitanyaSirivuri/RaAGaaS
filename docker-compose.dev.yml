services:
  backend:
    volumes:
      - ./backend/app:/app/app
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["bun", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]

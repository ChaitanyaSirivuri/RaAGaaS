services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ragaas
      POSTGRES_USER: ragaas
      POSTGRES_PASSWORD: ragaas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragaas"]
      interval: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.24.0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
    volumes:
      - weaviatedata:/var/lib/weaviate
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      weaviate:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  weaviatedata:
